# Canonical tag-driven npm publish for the public @planoda/* packages.
# Source of truth: monorepo scripts/oss/workflows/publish.yml → mirrored into each
# public repo's .github/workflows/ by scripts/oss/mirror.mjs.
#
# Trigger: push a semver tag (e.g. `v0.1.2`). The job rebuilds + tests from a clean
# checkout, then publishes to npm WITH PROVENANCE (a signed, verifiable link from the
# tarball back to this workflow run) under the @planoda scope.
#
# Requires ONE repo/org secret: NPM_TOKEN — an npm *automation* token for an account
# that owns the @planoda scope (ideally the `planoda` npm org). Provenance additionally
# needs `id-token: write` (below) and npm >= 9.5 (bundled with Node 20+).
name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      # No `cache: npm` — these packages intentionally ship without a lockfile.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm run build --if-present
      # Fail loudly if the tag (v0.1.2) doesn't match package.json's version (0.1.2).
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG != package.json version $PKG"; exit 1
          fi
      # Idempotency: a version already on npm can never be re-published, so a
      # re-run (or a manual publish that already happened) must be a SKIP, not a
      # red build. `npm view` needs no auth for a public package.
      - name: Skip if this version is already on npm
        id: published
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VER="$(node -p "require('./package.json').version")"
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VER is already published — skipping."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fail clearly when NPM_TOKEN is missing
        if: steps.published.outputs.already == 'false' && env.NPM_TOKEN == ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "::error::NPM_TOKEN secret is not set on this repo/org, so npm publish cannot authenticate."
          echo "Create an npm *automation* token and add it: gh secret set NPM_TOKEN --repo ${{ github.repository }}"
          exit 1
      - name: Publish to npm (with provenance)
        if: steps.published.outputs.already == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
